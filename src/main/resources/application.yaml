spring:
  application:
    name: payment-gateway
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/paymentgateway}
    username: ${DB_USER:user}
    password: ${DB_PASS:1234}
    jpa:
      hibernate:
        ddl-auto: create
      show-sql: true
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

